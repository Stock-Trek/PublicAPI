name: Test

on:
  push:
    branches: [master]

jobs:
  test:
    name: Test on ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: 2014
            container: "quay.io/pypa/manylinux_2_28_x86_64"
            compatibility: manylinux_2_28
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: 2014
            container: "messense/manylinux_2_28-cross:aarch64"
            compatibility: manylinux_2_28
          - target: x86_64-apple-darwin
            os: macos-latest
            compatibility: universal2
          - target: aarch64-apple-darwin
            os: macos-latest
            compatibility: universal2
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            compatibility: pypi
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run checks
        run: |
          cargo fmt --check
          cargo clippy
          cargo test
      - name: Check build
        uses: PyO3/maturin-action@v1.50.1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          container: ${{ matrix.container || 'off' }}
          args: >
            --release
            --locked
            --compatibility ${{ matrix.compatibility || 'pypi' }}
            --out dist
